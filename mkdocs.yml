# For testers

If you've agreed to help test this resource, this page tells you what to expect. It should take about five minutes to read. Thank you — your time and honest reactions will directly shape how clear, useful, and trustworthy this resource is when it reaches the people who need it.

## What this is

This resource is a public landscape of monogenic epilepsy genes — patient communities, registries, research efforts, and therapeutic programs. We want to know whether it actually works. Whether someone from your background can land on it, find what they need, and walk away with something useful.

We're not testing you. We're testing the site. If you get stuck, that's a finding we need.

## What we'll ask you to do

In a 60–90 minute session over a video call (or in person, if local), we'll ask you to:

- React to the site cold — first impressions, before you've explored.
- Explore freely for a few minutes while talking through what you're noticing.
- Try a handful of realistic tasks (*find X*, *figure out Y*) — we'll give you the task cards during the session.
- Try a couple of those tasks on your phone or tablet, to see how the site holds up.
- Talk through your overall impressions at the end.

After the session, we'll send you a short feedback form (about 10 minutes) to capture anything that surfaces once you've had a chance to reflect.

## What we'd love from you

!!! tip "Think aloud"
    Tell us what you're seeing, what you're trying, what's pulling your attention — even when it feels obvious.

!!! tip "Be honest"
    If something is confusing, ugly, or annoying, please say so. We can't fix what we don't hear about.

!!! tip "Don't worry about being polite"
    Critical feedback is the most valuable kind. We genuinely want it.

!!! tip "Don't prep"
    Please don't explore the site in advance. Your first-impression reactions are part of what we're trying to capture.

## Logistics

| | |
|---|---|
| When | The time we agreed on, in your time zone |
| Where | A video link we'll send you (or an address, if in person) |
| How long | 60–90 minutes for the live session; ~10 minutes for the form afterwards |
| What you'll need | A computer with a working browser and mic, plus your phone or tablet for the cross-device portion |
| Recording | We'd like to record the session for our team's review. We'll confirm consent at the start and you can decline. Recordings are not shared publicly and are deleted within a few weeks. |
| If you can't make it | Please let us know at least 24 hours in advance so we can reschedule. |

## A note on privacy

We will not use your name in any public output without your permission. When we report findings, we describe testers by audience type ("a clinician," "a foundation staffer") rather than by name. The session recording, if you consent to it, is used only for the team's review and analysis.

## A note on the topic

This resource covers conditions that affect real families, and we know some of our testers come to it because of personal experience. If anything in a session feels uncomfortable, you can pause, change direction, or stop entirely — no explanation needed. Your wellbeing matters more than our testing schedule.

