site_name: Boyce Lab Genetic Epilepsy Landscape
site_description: A community-facing landscape of monogenic epilepsy genes — patient communities, registries, research efforts, and therapeutic programs.
site_author: Boyce Lab

site_url: https://boycelab.github.io/landscape/

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Public Sans
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tooltips
    - announce.dismiss
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Dashboard: dashboard.md
  - Methodology: methodology.md
  - Glossary: glossary.md
  - Data: data.md
  - About: about.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/solid/envelope
      link: mailto:danielle@boycedatascience.com
      name: Email Danielle

copyright: >
  Compiled by the Boyce Lab. Source data from Genes4Epilepsy (Bahlo Lab) and individual foundation websites.
  This is a living community resource — <a href="mailto:danielle@boycedatascience.com">submit corrections</a>.
